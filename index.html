<meta name="description" content="12の問いと基本情報から、筋骨格・心肺・認知の3軸であなたの運動タイプを可視化。8タイプ別の1週間プランを提案します。" />

<style>
/* =========================================================
   運動タイプ診断 — Clinical instrument, but human.
   Design tokens
   ========================================================= */
:root{
  /* surfaces */
  --paper:#e7ebe7;          /* cool clinical paper, not warm cream */
  --card:#fbfcfb;
  --card-2:#f1f4f1;
  --line:#d4dad4;
  --line-strong:#b6bfb6;

  /* ink */
  --ink:#172019;            /* near-black, faint green-cool cast */
  --ink-2:#445049;
  --ink-3:#7c867f;

  /* accents */
  --vital:#1f6f50;          /* primary — clinical green (go / breath) */
  --vital-deep:#15543c;
  --vital-soft:#e3efe9;
  --signal:#d8593b;         /* sparing warm signal / pulse */

  /* axis hues (muted, harmonise on paper) */
  --axis-body:#b07a2e;      /* 筋骨格 ochre */
  --axis-stamina:#1f6f50;   /* 心肺 green */
  --axis-mind:#5b5ba6;      /* 認知 indigo */

  --line-brand:#06c755;     /* LINE */

  /* type */
  --serif:"Zen Old Mincho",serif;
  --sans:"Zen Kaku Gothic New",system-ui,sans-serif;
  --mono:"Roboto Mono",ui-monospace,monospace;

  /* scale */
  --r:14px;
  --r-sm:9px;
  --shadow:0 18px 50px -24px rgba(23,32,25,.45);
  --shadow-sm:0 2px 10px -4px rgba(23,32,25,.25);
  --ease:cubic-bezier(.4,0,.2,1);
}

*{box-sizing:border-box;}
html,body{height:auto;min-height:100%;}
body{
  margin:0;
  font-family:var(--sans);
  color:var(--ink);
  background:
    radial-gradient(120% 90% at 50% -10%, #eef1ee 0%, var(--paper) 55%) fixed;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  padding:clamp(0px,3vw,28px);
}
button{font-family:inherit;cursor:pointer;}
:focus-visible{outline:2.5px solid var(--vital);outline-offset:3px;border-radius:6px;}

/* =========================================================
   App shell — a normal document column, not a fixed-height box
   ========================================================= */
.app{
  position:relative;
  width:100%;max-width:1000px;
  margin:0 auto;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:clamp(0px,2vw,26px);
  box-shadow:var(--shadow);
  overflow:hidden;
}
@media (max-width:640px){
  body{padding:0;}
  .app{border-radius:0;border-left:0;border-right:0;}
}

/* top progress trace */
.trace{
  position:absolute;top:0;left:0;right:0;height:3px;
  background:var(--line);z-index:6;opacity:0;transition:opacity .3s;
}
.trace[data-on="1"]{opacity:1;}
.trace__fill{height:100%;width:0;background:linear-gradient(90deg,var(--vital),var(--vital-deep));
  transition:width .5s var(--ease);}

/* ambient ECG baseline (signature motif) */
.ecg{
  position:absolute;left:0;right:0;bottom:0;height:54px;
  pointer-events:none;opacity:.5;z-index:0;
  -webkit-mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);
          mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);
}
.ecg path{
  fill:none;stroke:var(--vital);stroke-width:1.6;opacity:.55;
  stroke-dasharray:1400;stroke-dashoffset:1400;
  animation:ecgDraw 4.5s linear infinite;
}
@keyframes ecgDraw{
  0%{stroke-dashoffset:1400;}
  60%,100%{stroke-dashoffset:0;}
}

/* content stage — just a container, not a scroller */
.stage{
  position:relative;z-index:1;
}
