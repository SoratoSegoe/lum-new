<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fit-Modi (フィット・モディ)</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #161f30;
            --text-color: #ffffff;
            --text-muted: #8fa0dd;
            --accent-neon: #00ffcc; 
            --accent-pink: #ff007f;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans JP', 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 画面切り替え用の制御 */
        .screen { display: none; }
        .screen.active { display: block; }

        h1.logo {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 2.2rem;
            text-align: center;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--accent-neon), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .tagline {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            margin-bottom: 32px;
        }

        /* 入力フォーム */
        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 12px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 2px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent-neon);
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, var(--accent-neon), #00bfff);
            color: #000;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 204, 0.3);
        }

        /* プログレスバー */
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-bottom: 24px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--accent-neon);
            border-radius: 3px;
            transition: width 0.3s;
        }

        /* 質問エリア */
        .question-text {
            font-size: 1.15rem;
            font-weight: 700;
            line-height: 1.6;
            margin-bottom: 32px;
            text-align: center;
            min-height: 60px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            width: 100%;
            padding: 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            color: var(--text-color);
            font-size: 0.95rem;
            font-weight: 700;
            text-align: left;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background: rgba(0, 255, 204, 0.08);
            border-color: var(--accent-neon);
            color: var(--accent-neon);
        }

        /* 結果画面 */
        .result-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .result-modi-badge {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(255, 0, 127, 0.15);
            border: 1px solid var(--accent-pink);
            color: var(--accent-pink);
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .result-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent-neon);
            margin-bottom: 6px;
        }
        .result-desc {
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--text-muted);
            background: rgba(0,0,0,0.2);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
            border-left: 4px solid var(--accent-neon);
            padding-left: 8px;
        }
        .place-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .place-info h4 { font-size: 0.9rem; margin-bottom: 4px; }
        .place-info p { font-size: 0.75rem; color: var(--text-muted); }
        .map-link {
            background: #4285F4;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
        }

        /* SNSシェアエリア */
        .share-box {
            background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af, #515bd4);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-top: 24px;
            margin-bottom: 16px;
        }
        .share-box .mock-card {
            background: rgba(11, 15, 25, 0.9);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-insta {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="screen-start" class="screen active">
        <h1 class="logo">Fit-Modi</h1>
        <p class="tagline">FIND YOUR FITNESS MODE</p>
        
        <div style="text-align: center; margin-bottom: 32px;">
            <p style="font-size: 0.9rem; line-height: 1.6; color: #b4c3f0;">12の質問から、あなたの性格・メンタルに溶け込む最適なフィットネスを特定します。</p>
        </div>

        <div class="form-group">
            <label for="zipcode"><i class="fa-solid fa-location-dot" style="color: var(--accent-neon)"></i> 付近のスタジオを探すため、郵便番号を入力（半角数字7桁）</label>
            <input type="text" id="zipcode" placeholder="1070062" maxlength="7">
            <p id="zip-error" style="color: var(--accent-pink); font-size: 0.8rem; margin-top: 8px; display: none; text-align: center;">※郵便番号を7桁の数字で入力してください</p>
        </div>

        <button class="btn-primary" onclick="startQuiz()">診断をスタートする</button>
    </div>

    <div id="screen-quiz" class="screen">
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="question-number" style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; font-family: 'Montserrat'; font-weight: 700;">Q 1/12</div>
        <div id="question-text" class="question-text">読み込み中...</div>
        
        <div class="options-list">
            <button class="option-btn" onclick="nextQuestion(3)">とてもそう思う <i class="fa-solid fa-chevron-right" style="color: var(--accent-neon)"></i></button>
            <button class="option-btn" onclick="nextQuestion(2)">まあそう思う <i class="fa-solid fa-chevron-right" style="color: var(--accent-neon)"></i></button>
            <button class="option-btn" onclick="nextQuestion(1)">あまり思わない <i class="fa-solid fa-chevron-right" style="color: var(--accent-neon)"></i></button>
            <button class="option-btn" onclick="nextQuestion(0)">全く思わない <i class="fa-solid fa-chevron-right" style="color: var(--accent-neon)"></i></button>
        </div>
    </div>

    <div id="screen-result" class="screen">
        <div class="result-header">
            <span class="result-modi-badge">YOUR FIT-MODI STYLE</span>
            <div id="result-title" class="result-title">-</div>
            <div id="result-subtitle" style="font-size: 0.85rem; font-weight: 700; color: var(--text-muted);">-</div>
        </div>

        <div id="result-desc" class="result-desc">-</div>

        <div class="section-title">📍 <span id="display-zip"></span> 周辺の推奨スポット</div>
        <div id="places-container"></div>

        <div class="share-box">
            <div class="mock-card">
                <p style="font-size: 0.65rem; color: #8fa0dd; text-transform: uppercase; letter-spacing: 1px;">My Fit-Modi Type</p>
                <h5 id="share-title" style="font-size: 1.3rem; color: var(--accent-neon); margin: 6px 0;">-</h5>
                <p style="font-size: 0.75rem; color: var(--accent-pink);">#FitModi #フィットネス診断</p>
            </div>
            <button class="btn-insta" onclick="shareToInstagram()">
                <i class="fa-brands fa-instagram"></i> ストーリーでシェアする
            </button>
        </div>
        
        <button class="btn-primary" style="background: rgba(255,255,255,0.08); color: #fff; box-shadow: none; margin-top: 12px;" onclick="location.reload()">もう一度診断する</button>
    </div>

</div>

<script>
    const questions = [
        "運動するなら1人で黙々と音楽に没頭したい",
        "予定のない休日は家でゆっくり過ごすのが1番回復する",
        "体を変えるなら体重や筋肉量などの「数字」にこだわりたい",
        "運動した翌日に筋肉痛がないとぶっちゃけ物足りない",
        "ゲームや趣味は、ストーリーより効率的な「攻略」が好きだ",
        "ストレスが溜まったら、何かを叩いたり叫んだりして発散したい",
        "流行りのスポットや新しい体験にはとりあえず乗っかりたい",
        "運動しているときの「他人の目」はけっけう気になる",
        "毎日おなじルーティン（決まった流れ）をこなす方が安心する",
        "自然（緑・海・風）に触れると格別に心が洗われる感覚がある",
        "忙しい時期ほど、あえて頭を空っぽにする時間が欲しい",
        "運動は「限界への挑戦」というより「明日への投資」だ"
    ];

    const modiTypes = {
        zen: {
            title: "🌿 Zen-Chill (ゼン・チル)",
            subtitle: "「内省 × リラックス × マイペース」",
            desc: "あなたは数字のプレッシャーや周囲との競争から離れ、自分の心と体に耳を傾けることで回復するタイプ。ガチガチの筋トレより、ピラティスやヨガ、静かなウォーキングが脳と体にフィットします。",
            keywords: ["ピラティス", "ヨガスタジオ"]
        },
        beast: {
            title: "⚡️ Active-Striker",
            subtitle: "「限界突破 × 結果主義 × ストイック」",
            desc: "あなたは自分を追い込み、限界を超えた先の達成感に最も快感を覚えるタイプ。筋肉痛はご褒美。HIITや暗闇ボクササイズ、クロスフィットなどで思い切り汗を流すのが最高にフィットします。",
            keywords: ["暗闇ボクササイズ", "24時間ジム"]
        },
        party: {
            title: "🔥 Groove-Runner",
            subtitle: "「エンタメ × コミュニティ × トレンド」",
            desc: "1人の単調な運動はすぐ飽きてしまうタイプ。音楽、演出、あるいは仲間との一体感があって初めてモチベが爆発します。ZUMBAなどのダンス系、最新のサイクルフィットネスがおすすめです。",
            keywords: ["インドアサイクル", "ダンススタジオ"]
        }
    };

    let currentQuestionIdx = 0;
    let totalScore = 0;
    let userZipcode = "";

    function startQuiz() {
        const zipInput = document.getElementById('zipcode').value.trim();
        // 簡易的な7桁数字チェック
        if(zipInput.length !== 7 || isNaN(zipInput)) {
            document.getElementById('zip-error').style.display = 'block';
            return;
        }
        document.getElementById('zip-error').style.display = 'none';
        userZipcode = zipInput;

        document.getElementById('screen-start').classList.remove('active');
        document.getElementById('screen-quiz').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        document.getElementById('question-number').innerText = `Q ${currentQuestionIdx + 1}/12`;
        document.getElementById('question-text').innerText = questions[currentQuestionIdx];
        
        const progressPercent = (currentQuestionIdx / questions.length) * 100;
        document.getElementById('progress-bar').style.width = progressPercent + "%";
    }

    function nextQuestion(score) {
        totalScore += score;
        currentQuestionIdx++;

        if(currentQuestionIdx < questions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('screen-quiz').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');

        let finalType = modiTypes.zen;
        if (totalScore > 24) {
            finalType = modiTypes.beast;
        } else if (totalScore > 14) {
            finalType = modiTypes.party;
        }

        document.getElementById('result-title').innerText = finalType.title;
        document.getElementById('result-subtitle').innerText = finalType.subtitle;
        document.getElementById('result-desc').innerText = finalType.desc;
        document.getElementById('display-zip').innerText = "〒" + userZipcode;
        document.getElementById('share-title').innerText = finalType.title;

        // おすすめ施設のGoogleマップリンク生成
        const container = document.getElementById('places-container');
        container.innerHTML = ""; 

        finalType.keywords.forEach(function(keyword, index) {
            // 安全なエスケープを用いてURLを作成
            const query = encodeURIComponent(userZipcode + " " + keyword);
            const mapUrl = "https://www.google.com/maps/search/?api=1&query=" + query;
            
            const card = document.createElement('div');
            card.className = 'place-card';
            card.innerHTML = `
                <div class="place-info">
                    <h4>最も近いおすすめの ${keyword}</h4>
                    <p>〒${userZipcode} 付近のスタジオをMapで検索</p>
                </div>
                <a href="${mapUrl}" target="_blank" class="map-link">
                    <i class="fa-solid fa-map-location-dot"></i>
                </a>
            `;
            container.appendChild(card);
        });
    }

    function shareToInstagram() {
        alert("📸 Instagram ストーリー連携イメージ 📸\n\n「#FitModi」がコピーされました！このままスクリーンショットを撮影して、インスタのストーリーに貼り付けてシェアしましょう！");
    }
</script>
</body>
</html>
